name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint + Typecheck + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @testforge/shared-types build

      - name: Typecheck (backend)
        run: pnpm --filter @testforge/backend typecheck

      - name: Typecheck (frontend)
        run: pnpm --filter @testforge/frontend typecheck

      - name: Test (backend)
        run: pnpm --filter @testforge/backend test:coverage
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/backend/coverage/lcov.info
        continue-on-error: true
