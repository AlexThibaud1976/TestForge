<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Simple llama silhouette: body, neck, head, ear -->
  <!-- Body -->
  <ellipse cx="18" cy="28" rx="12" ry="8" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Neck -->
  <rect x="22" y="16" width="5" height="10" rx="2" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Head -->
  <ellipse cx="25" cy="13" rx="5" ry="4" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Ear -->
  <path d="M22 10 L20 5 L24 8 Z" fill="#333"/>
  <!-- Leg left front -->
  <line x1="12" y1="34" x2="11" y2="40" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Leg right front -->
  <line x1="18" y1="35" x2="18" y2="40" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Leg left back -->
  <line x1="24" y1="35" x2="25" y2="40" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M30 26 Q36 22 34 18" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
</svg>
