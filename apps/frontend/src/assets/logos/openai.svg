<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Outer ring -->
  <circle cx="20" cy="20" r="18" fill="none" stroke="#000" stroke-width="2"/>
  <!-- 6 petals radiating from center -->
  <ellipse cx="20" cy="11" rx="3.5" ry="6" fill="#000"/>
  <ellipse cx="20" cy="11" rx="3.5" ry="6" fill="#000" transform="rotate(60 20 20)"/>
  <ellipse cx="20" cy="11" rx="3.5" ry="6" fill="#000" transform="rotate(120 20 20)"/>
  <ellipse cx="20" cy="11" rx="3.5" ry="6" fill="#000" transform="rotate(180 20 20)"/>
  <ellipse cx="20" cy="11" rx="3.5" ry="6" fill="#000" transform="rotate(240 20 20)"/>
  <ellipse cx="20" cy="11" rx="3.5" ry="6" fill="#000" transform="rotate(300 20 20)"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="3" fill="#fff"/>
</svg>
